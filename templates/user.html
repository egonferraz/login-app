<!DOCTYPE html>
<html>
<head>
<title>Usuários</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-[500px]">

<h2 class="text-2xl font-bold mb-6 text-center">
Lista de usuários
</h2>

<table class="w-full border">

<thead>
<tr class="bg-gray-200">
<th class="p-2 border">ID</th>
<th class="p-2 border">Nickname</th>
<th class="p-2 border">Username</th>
<th class="p-2 border">Ações</th>
</tr>
</thead>

<tbody>

{{range .Users}}

<tr>
<td class="p-2 border text-center">{{.ID}}</td>
<td class="p-2 border text-center">{{.Nickname}}</td>
<td class="p-2 border text-center">{{.Username}}</td>

<td class="p-2 border text-center">

<a
href="/edit-user?id={{.ID}}"
class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600 mr-2"
>
Editar
</a>

<a
href="/delete-user?id={{.ID}}"
class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600"
>
Deletar
</a>

</td>

</tr>

{{end}}

</tbody>

</table>

<div class="mt-4 text-center">

<a
href="/dashboard"
class="text-blue-500 hover:underline"
>
Voltar ao dashboard
</a>

</div>

</div>

</body>
</html>
