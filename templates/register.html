<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center">Criar usuário</h2>

<form method="POST">

<input
class="w-full border p-2 mb-4 rounded"
type="text"
name="nickname"
placeholder="Nickname"
/>

<input
class="w-full border p-2 mb-4 rounded"
type="text"
name="username"
placeholder="Username"
/>

<input
class="w-full border p-2 mb-4 rounded"
type="password"
name="password"
placeholder="Password"
/>

<button
class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600"
>
Criar usuário
</button>

</form>

<div class="mt-4 text-center">

<a class="text-blue-500 hover:underline" href="/dashboard">
Voltar ao dashboard
</a>
<br>
<a class="text-blue-500 hover:underline" href="/logout">Logout</a>

</div>

</div>

</body>
</html>
